version: '3.8'

services:
  mongodb:
    image: mongo:6.0
    container_name: canteen_db
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db
    networks:
      - canteen-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: canteen_backend
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - MONGODB_URI=mongodb://mongodb:27017/canteen
      - JWT_SECRET=canteen_jwt_secret_token_123!
      - FRONTEND_URL=http://localhost:5173
    depends_on:
      - mongodb
    networks:
      - canteen-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: canteen_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000/api
      - VITE_WS_URL=http://localhost:5000
    depends_on:
      - backend
    networks:
      - canteen-network

networks:
  canteen-network:
    driver: bridge

volumes:
  mongo-data:
